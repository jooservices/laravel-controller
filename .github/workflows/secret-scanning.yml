name: Secret Scanning

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disabled:
    name: Secret Scanning Disabled
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Disabled by default
        run: echo "Enable the gitleaks job when GITLEAKS_LICENSE is configured."

